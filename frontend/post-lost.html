<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Post Lost Item - Campus Lost & Found</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <!-- Navigation -->
  <nav class="navbar">
    <div class="container">
      <div class="nav-brand">
        <h1>🔍 Lost & Found</h1>
      </div>
      <ul class="nav-links">
        <li><a href="index.html">Home</a></li>
        <li><a href="search.html">Search Items</a></li>
        <li id="userNav">
          <a href="login.html">Login</a>
        </li>
      </ul>
    </div>
  </nav>

  <!-- Post Item Section -->
  <section class="auth-section">
    <div class="auth-container">
      <div class="auth-form">
        <h2>Report Lost Item</h2>
        <form id="postLostForm">
          <div class="form-group">
            <label for="title">Item Name *</label>
            <input type="text" id="title" name="title" placeholder="e.g., Red Backpack" required>
          </div>

          <div class="form-group">
            <label for="description">Item Description *</label>
            <textarea id="description" name="description" rows="4" placeholder="Describe your item in detail..." required></textarea>
          </div>

          <div class="form-group">
            <label for="category">Category *</label>
            <select id="category" name="category" required>
              <option value="">Select Category</option>
              <option value="idCard">ID Card</option>
              <option value="books">Books</option>
              <option value="calculator">Calculator</option>
              <option value="waterBottle">Water Bottle</option>
              <option value="accessories">Accessories</option>
              <option value="electronics">Electronics</option>
              <option value="documents">Documents</option>
              <option value="other">Other</option>
            </select>
          </div>

          <div class="form-group">
            <label for="location">Location Lost *</label>
            <input type="text" id="location" name="location" placeholder="e.g., Library, Block A" required>
          </div>

          <div class="form-group">
            <label for="foundDate">Date Lost *</label>
            <input type="date" id="foundDate" name="foundDate" required>
          </div>

          <div class="form-group">
            <label for="image">Item Photo (Optional)</label>
            <input type="file" id="image" name="image" accept="image/*">
            <small>Supported: JPG, PNG, GIF (Max 2MB)</small>
          </div>

          <div id="errorMessage" class="error-message" style="display: none;"></div>
          <div id="successMessage" class="success-message" style="display: none;"></div>

          <button type="submit" class="btn btn-primary" style="width: 100%;">Post Lost Item</button>
        </form>
      </div>
    </div>
  </section>

  <!-- Footer -->
  <footer class="footer">
    <div class="container">
      <p>&copy; 2024 Campus Lost & Found Portal. All rights reserved.</p>
    </div>
  </footer>

  <script src="js/main.js"></script>
  <script src="js/navbar.js"></script>
  <script src="js/post-item.js"></script>
</body>
</html>
