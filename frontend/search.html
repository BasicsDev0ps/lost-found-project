<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Search Items - Campus Lost & Found</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <!-- Navigation -->
  <nav class="navbar">
    <div class="container">
      <div class="nav-brand">
        <h1>🔍 Lost & Found</h1>
      </div>
      <ul class="nav-links">
        <li><a href="index.html">Home</a></li>
        <li><a href="search.html">Search Items</a></li>
        <li><a href="post-found.html">Post Found Item</a></li>
        <li><a href="post-lost.html">Post Lost Item</a></li>
        <li id="userNav">
          <a href="login.html">Login</a>
        </li>
      </ul>
    </div>
  </nav>

  <!-- Search Section -->
  <section class="search-section">
    <div class="container">
      <h2>Search for Items</h2>
      
      <div class="search-filters">
        <div class="search-box">
          <input type="text" id="searchInput" placeholder="Search by item name, location...">
          <button id="searchBtn" class="btn btn-primary">Search</button>
        </div>

        <div class="filters-grid">
          <div class="filter-group">
            <label for="filterType">Item Type</label>
            <select id="filterType">
              <option value="">All Types</option>
              <option value="lost">Lost Items</option>
              <option value="found">Found Items</option>
            </select>
          </div>

          <div class="filter-group">
            <label for="filterCategory">Category</label>
            <select id="filterCategory">
              <option value="">All Categories</option>
              <option value="idCard">ID Card</option>
              <option value="books">Books</option>
              <option value="calculator">Calculator</option>
              <option value="waterBottle">Water Bottle</option>
              <option value="accessories">Accessories</option>
              <option value="electronics">Electronics</option>
              <option value="documents">Documents</option>
              <option value="other">Other</option>
            </select>
          </div>

          <div class="filter-group">
            <label for="filterStatus">Status</label>
            <select id="filterStatus">
              <option value="">All Status</option>
              <option value="available">Available</option>
              <option value="claimed">Claimed</option>
              <option value="resolved">Resolved</option>
            </select>
          </div>

          <div class="filter-group">
            <label for="filterLocation">Location</label>
            <input type="text" id="filterLocation" placeholder="Search by location">
          </div>
        </div>

        <button id="applyFiltersBtn" class="btn btn-secondary">Apply Filters</button>
      </div>
    </div>
  </section>

  <!-- Results Section -->
  <section class="results-section">
    <div class="container">
      <div id="itemsContainer" class="items-grid">
        <!-- Items will be loaded here by JavaScript -->
      </div>
      <div id="noResults" class="no-results" style="display: none;">
        <p>No items found. Try adjusting your search filters.</p>
      </div>
    </div>
  </section>

  <!-- Footer -->
  <footer class="footer">
    <div class="container">
      <p>&copy; 2024 Campus Lost & Found Portal. All rights reserved.</p>
    </div>
  </footer>

  <script src="js/main.js"></script>
  <script src="js/navbar.js"></script>
  <script src="js/search.js"></script>
</body>
</html>
