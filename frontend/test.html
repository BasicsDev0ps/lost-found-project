<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lost & Found - API Test</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 20px;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
    }

    .header {
      background: white;
      border-radius: 10px;
      padding: 30px;
      margin-bottom: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
      text-align: center;
    }

    .header h1 {
      color: #667eea;
      margin-bottom: 10px;
    }

    .header p {
      color: #666;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 20px;
      margin-bottom: 20px;
    }

    .card {
      background: white;
      border-radius: 10px;
      padding: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    }

    .card h2 {
      color: #667eea;
      margin-bottom: 15px;
      font-size: 18px;
    }

    .button {
      display: inline-block;
      padding: 10px 20px;
      background: #667eea;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      margin-right: 10px;
      margin-top: 10px;
      font-size: 14px;
    }

    .button:hover {
      background: #764ba2;
    }

    .status {
      margin-top: 10px;
      padding: 10px;
      border-radius: 5px;
      font-size: 14px;
    }

    .status.success {
      background: #d4edda;
      color: #155724;
    }

    .status.error {
      background: #f8d7da;
      color: #721c24;
    }

    .items-list {
      background: white;
      border-radius: 10px;
      padding: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
      margin-top: 20px;
    }

    .item-card {
      background: #f8f9fa;
      border-left: 4px solid #667eea;
      padding: 15px;
      margin-bottom: 10px;
      border-radius: 5px;
    }

    .item-card h3 {
      color: #333;
      margin-bottom: 5px;
    }

    .item-card p {
      color: #666;
      font-size: 14px;
      margin-bottom: 5px;
    }

    .badge {
      display: inline-block;
      padding: 5px 10px;
      background: #667eea;
      color: white;
      border-radius: 20px;
      font-size: 12px;
      margin-right: 5px;
      margin-top: 5px;
    }

    input, textarea, select {
      width: 100%;
      padding: 10px;
      margin-bottom: 10px;
      border: 1px solid #ddd;
      border-radius: 5px;
      font-family: inherit;
    }

    textarea {
      resize: vertical;
      min-height: 80px;
    }

    .form-group {
      margin-bottom: 15px;
    }

    label {
      display: block;
      margin-bottom: 5px;
      color: #333;
      font-weight: 500;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>🎓 Campus Lost & Found Portal</h1>
      <p>Test all functionality - No MongoDB Required!</p>
    </div>

    <div class="grid">
      <div class="card">
        <h2>📝 Test Login</h2>
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="loginEmail" value="madhuravani@campus.edu">
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="loginPassword" value="password123">
        </div>
        <button class="button" onclick="testLogin()">Login</button>
        <div id="loginStatus" class="status" style="display:none;"></div>
      </div>

      <div class="card">
        <h2>📝 Test Register</h2>
        <div class="form-group">
          <label>Name</label>
          <input type="text" id="regName" value="John Doe">
        </div>
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="regEmail" value="john@campus.edu">
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="regPassword" value="password123">
        </div>
        <div class="form-group">
          <label>Phone</label>
          <input type="text" id="regPhone" value="+91-9876543212">
        </div>
        <button class="button" onclick="testRegister()">Register</button>
        <div id="registerStatus" class="status" style="display:none;"></div>
      </div>

      <div class="card">
        <h2>🔍 Get All Items</h2>
        <button class="button" onclick="getAllItems()">Load Items</button>
        <button class="button" onclick="getFoundItems()">Found Items Only</button>
        <button class="button" onclick="getLostItems()">Lost Items Only</button>
        <div id="itemsStatus" class="status" style="display:none;"></div>
      </div>
    </div>

    <div class="card" style="margin-bottom: 20px;">
      <h2>➕ Post a New Lost Item</h2>
      <div class="form-group">
        <label>Title</label>
        <input type="text" id="itemTitle" placeholder="e.g., Silver Watch">
      </div>
      <div class="form-group">
        <label>Description</label>
        <textarea id="itemDescription" placeholder="Describe the item..."></textarea>
      </div>
      <div class="form-group">
        <label>Category</label>
        <select id="itemCategory">
          <option value="accessories">Accessories</option>
          <option value="books">Books</option>
          <option value="documents">Documents</option>
          <option value="electronics">Electronics</option>
          <option value="clothing">Clothing</option>
        </select>
      </div>
      <div class="form-group">
        <label>Location</label>
        <input type="text" id="itemLocation" placeholder="Where did you lose it?">
      </div>
      <button class="button" onclick="postItem()">Post Lost Item</button>
      <div id="postItemStatus" class="status" style="display:none;"></div>
    </div>

    <div class="items-list">
      <h2>📋 All Items in System</h2>
      <div id="itemsContainer">
        <p>Click "Load Items" to see all items...</p>
      </div>
    </div>
  </div>

  <script>
    const API_URL = 'http://localhost:5000/api';

    function showStatus(elementId, message, isSuccess = true) {
      const element = document.getElementById(elementId);
      element.textContent = message;
      element.className = `status ${isSuccess ? 'success' : 'error'}`;
      element.style.display = 'block';
    }

    function getToken() {
      return localStorage.getItem('token');
    }

    function setToken(token) {
      localStorage.setItem('token', token);
    }

    async function testLogin() {
      try {
        const email = document.getElementById('loginEmail').value;
        const password = document.getElementById('loginPassword').value;

        const response = await fetch(`${API_URL}/auth/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password }),
        });

        const data = await response.json();

        if (!response.ok) {
          throw new Error(data.error);
        }

        setToken(data.token);
        showStatus('loginStatus', `✅ Login successful! Token: ${data.token.substring(0, 20)}...`, true);
      } catch (error) {
        showStatus('loginStatus', `❌ Login failed: ${error.message}`, false);
      }
    }

    async function testRegister() {
      try {
        const name = document.getElementById('regName').value;
        const email = document.getElementById('regEmail').value;
        const password = document.getElementById('regPassword').value;
        const phone = document.getElementById('regPhone').value;

        const response = await fetch(`${API_URL}/auth/register`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name, email, password, phone }),
        });

        const data = await response.json();

        if (!response.ok) {
          throw new Error(data.error);
        }

        showStatus('registerStatus', `✅ Registration successful! User: ${data.user.name}`, true);
      } catch (error) {
        showStatus('registerStatus', `❌ Registration failed: ${error.message}`, false);
      }
    }

    async function getAllItems() {
      try {
        const response = await fetch(`${API_URL}/items`);
        const items = await response.json();

        if (!response.ok) {
          throw new Error('Failed to fetch items');
        }

        displayItems(items);
        showStatus('itemsStatus', `✅ Loaded ${items.length} items`, true);
      } catch (error) {
        showStatus('itemsStatus', `❌ Failed to load items: ${error.message}`, false);
      }
    }

    async function getFoundItems() {
      try {
        const response = await fetch(`${API_URL}/items?type=found`);
        const items = await response.json();

        displayItems(items);
        showStatus('itemsStatus', `✅ Found ${items.length} found items`, true);
      } catch (error) {
        showStatus('itemsStatus', `❌ Failed: ${error.message}`, false);
      }
    }

    async function getLostItems() {
      try {
        const response = await fetch(`${API_URL}/items?type=lost`);
        const items = await response.json();

        displayItems(items);
        showStatus('itemsStatus', `✅ Found ${items.length} lost items`, true);
      } catch (error) {
        showStatus('itemsStatus', `❌ Failed: ${error.message}`, false);
      }
    }

    function displayItems(items) {
      const container = document.getElementById('itemsContainer');
      
      if (items.length === 0) {
        container.innerHTML = '<p>No items found</p>';
        return;
      }

      container.innerHTML = items.map(item => `
        <div class="item-card">
          <h3>${item.title}</h3>
          <p>${item.description}</p>
          <div>
            <span class="badge">${item.type === 'lost' ? '🔴 Lost' : '🟢 Found'}</span>
            <span class="badge">${item.category}</span>
            <span class="badge">${item.status}</span>
            <span class="badge">📍 ${item.location}</span>
          </div>
        </div>
      `).join('');
    }

    async function postItem() {
      try {
        const token = getToken();
        if (!token) {
          showStatus('postItemStatus', '❌ Please login first', false);
          return;
        }

        const title = document.getElementById('itemTitle').value;
        const description = document.getElementById('itemDescription').value;
        const category = document.getElementById('itemCategory').value;
        const location = document.getElementById('itemLocation').value;

        if (!title || !description || !location) {
          throw new Error('Please fill all fields');
        }

        const response = await fetch(`${API_URL}/items`, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${token}`,
          },
          body: JSON.stringify({
            title,
            description,
            category,
            type: 'lost',
            location,
          }),
        });

        const data = await response.json();

        if (!response.ok) {
          throw new Error(data.error);
        }

        showStatus('postItemStatus', `✅ Item posted successfully!`, true);
        document.getElementById('itemTitle').value = '';
        document.getElementById('itemDescription').value = '';
        document.getElementById('itemLocation').value = '';
        
        getAllItems();
      } catch (error) {
        showStatus('postItemStatus', `❌ Failed: ${error.message}`, false);
      }
    }

    // Load items on page load
    window.addEventListener('load', getAllItems);
  </script>
</body>
</html>
