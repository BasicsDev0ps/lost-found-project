<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard - Campus Lost & Found</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <!-- Navigation -->
  <nav class="navbar">
    <div class="container">
      <div class="nav-brand">
        <h1>🔍 Lost & Found</h1>
      </div>
      <ul class="nav-links">
        <li><a href="index.html">Home</a></li>
        <li><a href="search.html">Search Items</a></li>
        <li><a href="dashboard.html">Dashboard</a></li>
        <li id="userNav">
          <a href="login.html">Login</a>
        </li>
      </ul>
    </div>
  </nav>

  <!-- Dashboard Section -->
  <section class="dashboard-section">
    <div class="container">
      <h2>My Dashboard</h2>

      <!-- User Info Card -->
      <div class="dashboard-info">
        <div class="user-info">
          <h3 id="userName">Loading...</h3>
          <p id="userEmail">Email</p>
          <p id="userPhone">Phone</p>
        </div>
      </div>

      <!-- Tabs -->
      <div class="dashboard-tabs">
        <button class="tab-btn active" data-tab="my-items">My Posted Items</button>
        <button class="tab-btn" data-tab="claimed-items">Items I've Claimed</button>
        <button class="tab-btn" data-tab="profile">Profile Settings</button>
      </div>

      <!-- Tab Contents -->
      <div id="my-items" class="tab-content active">
        <h3>Items I've Posted</h3>
        <div id="myItemsContainer" class="items-grid">
          <!-- Items will be loaded here -->
        </div>
      </div>

      <div id="claimed-items" class="tab-content">
        <h3>Items I've Claimed</h3>
        <div id="claimedItemsContainer" class="items-grid">
          <!-- Items will be loaded here -->
        </div>
      </div>

      <div id="profile" class="tab-content">
        <h3>Profile Settings</h3>
        <form id="profileForm" class="profile-form">
          <div class="form-group">
            <label for="profileName">Full Name</label>
            <input type="text" id="profileName" name="name">
          </div>

          <div class="form-group">
            <label for="profileEmail">Email</label>
            <input type="email" id="profileEmail" name="email" disabled>
          </div>

          <div class="form-group">
            <label for="profilePhone">Phone</label>
            <input type="tel" id="profilePhone" name="phone">
          </div>

          <button type="submit" class="btn btn-primary">Update Profile</button>
        </form>
      </div>
    </div>
  </section>

  <!-- Footer -->
  <footer class="footer">
    <div class="container">
      <p>&copy; 2024 Campus Lost & Found Portal. All rights reserved.</p>
    </div>
  </footer>

  <script src="js/main.js"></script>
  <script src="js/navbar.js"></script>
  <script src="js/dashboard.js"></script>
</body>
</html>
